enum Course {
  STARTER
  MAIN
  DESSERT
}

enum Cuisine {
  ITALIAN
  INDIAN
}

enum Diet {
  VEGAN
  VEGGIE
}

type MenuItem {
  name: String!
  price: Float!
  course: Course!
  diet: Diet
}

type Query {
  restaurants: [Restaurant!]!
}

type Restaurant {
  name: String!
  cuisine: Cuisine!
  menu: [MenuItem!]!
  lat: Float!
  lon: Float!
}
